<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>sign-up-form</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div id="container">
        <img src="assets/photos.jpg" alt="">
        <div class="odin">
            <img src="assets/odin-lined.png" width="60px">
            <p>ODIN</p>

        </div>
        <p class="last">Photo by Kseniia Ilinykh on Unsplash</p>
    </div>

    <form action="" method="get">

        <div class="new-para">
            <div>This is not a real online service! You know you need something like this in your life to help you
                relize
                your deepest dream. Sign up to get started

                <span>You know you want to.</span>
            </div>
        </div>
        <div class="fieldset">
            <fieldset>

                <legend>Let's do this!</legend>

                <div>
                    <label for="first-name">FIRST NAME</label>
                    <input type="text" id="first-name" name="first-name">

                </div>
                <div>
                    <label for="last-name">LAST NAME</label>
                    <input type="text " id="last-name" name="last-name">

                </div>

                <div>
                    <label for="email">EMAIL</label>
                    <input type="email" id="email" name="email">

                </div>

                <div>
                    <label for="phone-number">PHONE NUMBER</label>
                    <input type="number" id="phone-number" name="phone-number">

                </div>

                <div><label for="password">PASSWORD</label>
                    <input type="password" id="password" name="password" required>

                </div>

                <div><label for="confirm-password">CONFIRM PASSWAROD</label>
                    <input type="password" name="password" id="confirm-password" required>

                </div>
            </fieldset>
        </div>

        <div class="submit-btn">
            <button type="submit">Creat Account</button>
            <p>Already have an account? <a href="#">Log in</a></p>

        </div>


    </form>
</body>

</html>
